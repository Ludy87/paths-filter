name: Bump Version

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Version increment (patch, minor, major or explicit version)"
        required: true
        type: choice
        options:
        - patch
        - minor
        - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: node scripts/update-version.js ${{ github.event.inputs.release }}
      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git commit -am "chore: bump version to ${VERSION}" || echo "No changes to commit"
          git push
